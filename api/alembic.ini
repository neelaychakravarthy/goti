# Alembic config for the Goti API. The DATABASE_URL is injected from
# `api.config.Settings` at runtime (see `alembic/env.py`).

[alembic]
script_location = alembic
prepend_sys_path = ..
version_path_separator = os
timezone = UTC
# sqlalchemy.url is set programmatically — leaving the placeholder here
# only for readability when running `alembic` directly from the CLI.
sqlalchemy.url = postgresql+asyncpg://goti:goti@postgres:5432/goti

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
